{% extends "base.html" %}
{% block title %}404 - Không tìm thấy trang{% endblock %}
{% block content %}
<div class="text-center py-5">
    <div style="font-size:4rem;margin-bottom:16px;color:var(--muted);">
        <i class="fas fa-search"></i>
    </div>
    <div class="page-title mb-2">404 — Không tìm thấy</div>
    <p style="color:var(--muted);margin-bottom:24px;">
        Trang bạn tìm kiếm không tồn tại hoặc đã bị xóa.
    </p>
    {% if current_user.is_authenticated %}
    <a href="{{ url_for('dashboard') }}" class="btn btn-navy px-4">
        <i class="fas fa-home me-1"></i>Về Dashboard
    </a>
    {% else %}
    <a href="{{ url_for('guest_home') }}" class="btn btn-navy px-4">
        <i class="fas fa-home me-1"></i>Về Trang chủ
    </a>
    {% endif %}
</div>
{% endblock %}
