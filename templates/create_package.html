{% extends "base.html" %}
{% block title %}Tạo gói từ - RundaWord{% endblock %}

{% block content %}

<div class="page-title">Create new Vocabulary Package</div>

<div class="rw-card" style="max-width:680px;">
    <form method="POST" enctype="multipart/form-data">

        <!-- NAME -->
        <div class="mb-4">
            <label class="rw-label">Package Name <span class="text-danger">*</span></label>
            <input type="text" class="rw-input" name="package_name" placeholder="Insert package name" required>
        </div>

        <!-- DESCRIPTION -->
        <div class="mb-4">
            <label class="rw-label">Description</label>
            <input type="text" class="rw-input" name="description"
                placeholder="Describe this package" maxlength="70"
                oninput="document.getElementById('descCount').textContent=this.value.length">
            <div class="text-end mt-1" style="font-size:0.8rem;color:var(--muted);">
                <span id="descCount">0</span>/70 char.
            </div>
        </div>

        <!-- 🔥 PUBLIC / PRIVATE -->
        <div class="mb-4">
            <label class="rw-label">Visibility</label>

            <div class="d-flex gap-3 mt-2">
                <label class="visibility-option">
                    <input type="radio" name="is_public" value="true" checked>
                    <div class="option-box">
                        🌍 Public
                        <div class="small-text">Ai cũng có thể thấy</div>
                    </div>
                </label>

                <label class="visibility-option">
                    <input type="radio" name="is_public" value="false">
                    <div class="option-box">
                        🔒 Private
                        <div class="small-text">Chỉ mình bạn thấy</div>
                    </div>
                </label>
            </div>
        </div>

        <!-- FILE -->
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="rw-label mb-0">Vocabularies Upload</label>
                <a href="{{ url_for('download_template') }}"
                    style="font-size:0.85rem;color:var(--accent);font-weight:600;text-decoration:underline;">
                    Tải template
                </a>
            </div>

            <div class="position-relative">
                <input type="text" class="rw-input pe-5" id="fileLabel"
                    placeholder="Upload file..." readonly
                    onclick="document.getElementById('vocab_file').click()" style="cursor:pointer;">

                <label for="vocab_file"
                    style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;">
                    <i class="fas fa-paperclip"></i>
                </label>

                <input type="file" id="vocab_file" name="vocab_file"
                    accept=".csv,.xlsx,.xls" style="display:none;"
                    onchange="document.getElementById('fileLabel').value=this.files[0]?this.files[0].name:''">
            </div>
        </div>

        <div class="text-end">
            <button type="submit" class="btn btn-navy px-4">Create Package</button>
        </div>

    </form>
</div>

{% endblock %}

{% block head_extra %}
<style>
.visibility-option input {
    display: none;
}

.option-box {
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 600;
}

.option-box .small-text {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 500;
}

.visibility-option input:checked + .option-box {
    border-color: var(--navy);
    background: #eef3fb;
}
</style>
{% endblock %}
