{% extends "base.html" %}

{% block title %}Sửa {{ package.package_name }} - RundaWord{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Sửa gói từ vựng</h2>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="package_name" class="form-label">Tên gói <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="package_name" name="package_name" value="{{ package.package_name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Mô tả</label>
                            <textarea class="form-control" id="description" name="description" rows="3" maxlength="200">{{ package.package_description or '' }}</textarea>
                            <div class="form-text">Tối đa 200 ký tự</div>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            <a href="{{ url_for('package_detail', package_id=package.id) }}" class="btn btn-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
