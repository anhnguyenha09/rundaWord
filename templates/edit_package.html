{% extends "base.html" %}

{% block title %}Chỉnh Sửa Gói Từ - RundaWord{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-8);">
    <h1>Edit Vocabulary Package</h1>
    <div style="display: flex; gap: var(--spacing-4);">
        <button class="btn btn-secondary" onclick="window.history.back();">Cancel</button>
        <button class="btn btn-primary" form="editForm">Save</button>
    </div>
</div>

<div class="card" style="max-width: 900px;">
    <form id="editForm" method="POST">
        <!-- Package Name -->
        <div class="form-group">
            <label class="form-label">
                Package Name
                <span class="required">*</span>
            </label>
            <input type="text" name="package_name" class="form-input" value="Politics" required>
        </div>

        <!-- Description -->
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" maxlength="70">Lorem ipsum</textarea>
            <div class="char-count">11/70 char</div>
        </div>

        <!-- File Upload -->
        <div class="form-group">
            <label class="form-label">
                Vocabularies Upload
                <span class="required">*</span>
            </label>
            <div style="position: relative; display: flex; align-items: center;">
                <input type="file" name="vocab_file" class="form-input" placeholder="Upload .xlsx file containing your vocabularies" accept=".xlsx,.xls">
                <button type="button" class="btn btn-icon" style="position: absolute; right: 10px; background: none; color: var(--gray-500); cursor: pointer;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
            <p class="form-helper">
                <a href="{{ url_for('static', filename='templates/template.xlsx') }}" style="color: var(--primary-light); font-weight: 500;">Tải xuống .xlsx template tại đây</a>
            </p>
        </div>

        <!-- Vocabulary List -->
        <div style="margin-top: var(--spacing-8);">
            <div style="text-align: center; margin-bottom: var(--spacing-6);">
                <button type="button" class="btn btn-primary" style="background-color: #1a3a52;">Add new word</button>
            </div>

            <!-- Vocabulary Item 1 (Empty) -->
            <div class="vocabulary-item">
                <div style="width: 100%;">
                    <div class="vocabulary-item-content">
                        <div class="vocabulary-field">
                            <label style="font-weight: 500; margin-bottom: var(--spacing-2);">Từ tiếng Anh</label>
                            <input type="text" placeholder="Từ tiếng Anh">
                        </div>
                        <div class="vocabulary-field">
                            <label style="font-weight: 500; margin-bottom: var(--spacing-2);">Từ tiếng Việt</label>
                            <input type="text" placeholder="Từ tiếng Việt">
                        </div>
                    </div>
                    <div class="vocabulary-item-actions">
                        <button type="button" class="btn btn-icon-small btn-light" title="Link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                        </button>
                        <button type="button" class="btn btn-icon-small btn-light" title="Delete" style="color: var(--error);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Vocabulary Item 2 -->
            <div class="vocabulary-item">
                <div style="width: 100%;">
                    <div class="vocabulary-item-number">2</div>
                    <div class="vocabulary-item-content">
                        <div class="vocabulary-field">
                            <label style="font-weight: 500; margin-bottom: var(--spacing-2);">Từ tiếng Anh</label>
                            <input type="text" value="Government">
                        </div>
                        <div class="vocabulary-field">
                            <label style="font-weight: 500; margin-bottom: var(--spacing-2);">Từ tiếng Việt</label>
                            <input type="text" value="Chính phủ">
                        </div>
                    </div>
                    <div class="vocabulary-item-actions">
                        <button type="button" class="btn btn-icon-small btn-light" title="Link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                        </button>
                        <button type="button" class="btn btn-icon-small btn-light" title="Delete" style="color: var(--error);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Vocabulary Item 3 -->
            <div class="vocabulary-item">
                <div style="width: 100%;">
                    <div class="vocabulary-item-number">1</div>
                    <div class="vocabulary-item-content">
                        <div class="vocabulary-field">
                            <label style="font-weight: 500; margin-bottom: var(--spacing-2);">Từ tiếng Anh</label>
                            <input type="text" value="Government">
                        </div>
                        <div class="vocabulary-field">
                            <label style="font-weight: 500; margin-bottom: var(--spacing-2);">Từ tiếng Việt</label>
                            <input type="text" value="Chính phủ">
                        </div>
                    </div>
                    <div class="vocabulary-item-actions">
                        <button type="button" class="btn btn-icon-small btn-light" title="Link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                        </button>
                        <button type="button" class="btn btn-icon-small btn-light" title="Delete" style="color: var(--error);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    // Character count for textarea
    const textarea = document.querySelector('textarea[name="description"]');
    const charCount = document.querySelector('.char-count');
    
    textarea.addEventListener('input', function() {
        charCount.textContent = this.value.length + '/70 char';
    });
</script>
{% endblock %}
