{% extends "base.html" %}
{% block title %}Sign in — RundaWord{% endblock %}

{% block content %}
<div class="auth-bg">
  <div class="login-card">
    <div class="login-brand">RundaWord</div>
    <div class="login-brand-sub">The Academic Curator</div>

    <div class="login-title">Welcome Back</div>
    <div class="login-sub">Please enter your credentials to access your library.</div>

    <form method="POST">
      <div style="margin-bottom:18px;">
        <label class="login-label">Email or Username</label>
        <div class="login-input-wrap">
          <i class="fas fa-user login-input-icon"></i>
          <input type="text" class="login-input" name="email"
            placeholder="e.g. curator@scholar.edu" required autocomplete="username">
        </div>
      </div>
      <div style="margin-bottom:24px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <label class="login-label" style="margin:0;">Password</label>
          <a href="#" class="login-link" style="font-size:0.77rem;">Forgot Password?</a>
        </div>
        <div class="login-input-wrap">
          <i class="fas fa-lock login-input-icon"></i>
          <input type="password" class="login-input" name="password"
            placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
        <input type="checkbox" id="remember" style="width:16px;height:16px;accent-color:white;">
        <label for="remember" style="font-size:0.8rem;color:rgba(255,255,255,0.45);cursor:pointer;margin:0;">
          Remember me for 7 days
        </label>
      </div>

      <button type="submit" class="login-btn">
        Access Library <i class="fas fa-arrow-right" style="font-size:0.8rem;"></i>
      </button>
    </form>

    <div style="margin-top:24px;text-align:center;">
      <a href="{{ url_for('register') }}" class="login-link">
        New to the curriculum? <strong>Register Here</strong>
      </a>
    </div>
  </div>
</div>
{% endblock %}
