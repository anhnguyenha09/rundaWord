{% extends "base.html" %}
{% block title %}Đăng nhập - RundaWord{% endblock %}
{% block content %}
<!-- thêm ảnh ở đây -->
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
    <div
        style="background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(13,33,55,0.12);">
        <h2
            style="font-family:'Poppins',sans-serif;font-weight:700;color:var(--navy);text-align:center;margin-bottom:28px;">
            Đăng nhập</h2>

        <form method="POST">
            <div class="mb-3">
                <label class="rw-label">Email/ Username</label>
                <input type="text" class="rw-input" name="email" placeholder="Nhập email hoặc tên người dùng" required>
            </div>
            <div class="mb-4">
                <label class="rw-label">Mật khẩu</label>
                <input type="password" class="rw-input" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn btn-navy w-100 py-3" style="font-size:1rem;">Đăng nhập</button>
        </form>

        <div class="text-center mt-3">
            <a href="{{ url_for('register') }}"
                style="color:var(--accent);font-weight:700;text-decoration:none;font-size:0.95rem;">Đăng ký</a>
        </div>
    </div>
</div>

{% endblock %}
