{% extends "base.html" %}
{% block title %}Kiểm tra - {{ package.package_name }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
    <a href="{{ url_for('package_detail', package_id=package.id) }}"
       style="color:var(--muted);font-size:0.85rem;font-weight:600;text-decoration:none;">
        ← {{ package.package_name }}
    </a>
    <span style="color:var(--muted);">·</span>
    <span style="font-family:'Poppins';font-weight:700;color:var(--navy);">Kiểm tra viết</span>
</div>

<div style="max-width:580px;margin:0 auto;">

    <!-- Progress -->
    <div class="d-flex justify-content-between mb-1">
        <span style="font-size:0.85rem;color:var(--muted);font-weight:600;">
            Câu <span id="qNum">1</span>/<span id="qTotal">?</span>
        </span>
        <span style="font-size:0.85rem;font-weight:700;">
            <span style="color:#27ae60;" id="scoreC">0</span> đúng &nbsp;
            <span style="color:#e74c3c;" id="scoreW">0</span> sai
        </span>
    </div>
    <div style="background:var(--border);border-radius:8px;height:6px;margin-bottom:20px;">
        <div id="progressBar" style="background:var(--navy);height:100%;border-radius:8px;width:0%;transition:width 0.3s;"></div>
    </div>

    <!-- Question card -->
    <div id="quizArea">
        <div class="quiz-card mb-3" style="min-height:140px;">
            <div class="q-prompt">Nghĩa tiếng Việt của từ này là gì?</div>
            <div class="q-word" id="qWord">...</div>
        </div>

        <div id="answerArea">
            <input type="text" id="answerInput" class="rw-input mb-2"
                placeholder="Nhập nghĩa tiếng Việt..." autocomplete="off" autocorrect="off"
                style="font-size:1rem;">
            <div id="feedback" class="mb-2" style="min-height:24px;font-weight:700;font-size:0.95rem;"></div>
            <div class="d-flex gap-2">
                <button id="submitBtn" class="btn btn-navy flex-grow-1" onclick="submitAnswer()">
                    Kiểm tra <kbd style="background:rgba(255,255,255,0.2);border:none;border-radius:4px;padding:1px 6px;font-size:0.75rem;">Enter</kbd>
                </button>
                <button id="skipBtn" class="btn btn-cream" onclick="skipQuestion()" title="Bỏ qua">
                    Bỏ qua
                </button>
            </div>
        </div>

        <div id="nextArea" class="d-none text-center mt-2">
            <button class="btn btn-navy px-5" onclick="nextQuestion()">
                Câu tiếp → <kbd style="background:rgba(255,255,255,0.2);border:none;border-radius:4px;padding:1px 6px;font-size:0.75rem;">Enter</kbd>
            </button>
        </div>
    </div>

    <!-- Result -->
    <div id="resultArea" class="d-none text-center">
        <div class="score-circle" id="scoreCircle"></div>
        <div style="font-weight:700;font-size:1.2rem;color:var(--navy);" id="resultTitle"></div>
        <div style="color:var(--muted);margin:6px 0 20px;" id="resultDesc"></div>
        <div class="d-flex gap-3 justify-content-center">
            <button class="btn btn-navy px-4" onclick="startTest()">Làm lại</button>
            <a href="{{ url_for('flashcard', package_id=package.id) }}" class="btn btn-cream px-4">Flashcard</a>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const allWords    = {{ package.vocabularies | map(attribute='word_en') | list | tojson | safe }};
const allMeanings = {{ package.vocabularies | map(attribute='word_vi') | list | tojson | safe }};

let questions = [], cur = 0, correct = 0, wrong = 0, answered = false;

function normalize(str) {
    // lowercase, trim, collapse spaces for loose matching
    return str.toLowerCase().trim().replace(/\s+/g, ' ');
}

function buildQuestions() {
    const indices = [...Array(allWords.length).keys()];
    // shuffle
    for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    questions = indices.map(i => ({ word: allWords[i], answer: allMeanings[i] }));
}

function startTest() {
    correct = 0; wrong = 0; cur = 0;
    buildQuestions();
    document.getElementById('resultArea').classList.add('d-none');
    document.getElementById('quizArea').classList.remove('d-none');
    document.getElementById('qTotal').textContent = questions.length;
    showQ();
}

function showQ() {
    if (cur >= questions.length) { showResult(); return; }
    answered = false;
    const q = questions[cur];
    document.getElementById('qNum').textContent = cur + 1;
    document.getElementById('qWord').textContent = q.word;
    document.getElementById('progressBar').style.width = Math.round(cur / questions.length * 100) + '%';
    document.getElementById('answerInput').value = '';
    document.getElementById('answerInput').disabled = false;
    document.getElementById('answerInput').style.borderColor = '';
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').style.color = '';
    document.getElementById('nextArea').classList.add('d-none');
    document.getElementById('answerArea').classList.remove('d-none');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('skipBtn').disabled = false;
    setTimeout(() => document.getElementById('answerInput').focus(), 50);
}

function submitAnswer() {
    if (answered) return;
    const input = document.getElementById('answerInput');
    const userAns = input.value.trim();
    if (!userAns) { input.focus(); return; }

    answered = true;
    const correctAns = questions[cur].answer;
    const isCorrect = normalize(userAns) === normalize(correctAns);

    input.disabled = true;
    const feedback = document.getElementById('feedback');

    if (isCorrect) {
        correct++;
        input.style.borderColor = '#27ae60';
        feedback.textContent = '✓ Đúng rồi!';
        feedback.style.color = '#27ae60';
    } else {
        wrong++;
        input.style.borderColor = '#e74c3c';
        feedback.innerHTML = `✗ Sai. Đáp án đúng: <strong style="color:#c0392b">${correctAns}</strong>`;
        feedback.style.color = '#e74c3c';
    }

    document.getElementById('scoreC').textContent = correct;
    document.getElementById('scoreW').textContent = wrong;
    document.getElementById('answerArea').classList.remove('d-none');
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('skipBtn').disabled = true;
    document.getElementById('nextArea').classList.remove('d-none');
}

function skipQuestion() {
    if (answered) return;
    answered = true;
    wrong++;
    const correctAns = questions[cur].answer;
    const input = document.getElementById('answerInput');
    input.disabled = true;
    input.style.borderColor = '#f39c12';
    const feedback = document.getElementById('feedback');
    feedback.innerHTML = `Đáp án: <strong style="color:#c0392b">${correctAns}</strong>`;
    feedback.style.color = '#f39c12';
    document.getElementById('scoreW').textContent = wrong;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('skipBtn').disabled = true;
    document.getElementById('nextArea').classList.remove('d-none');
}

function nextQuestion() {
    cur++;
    if (cur >= questions.length) { showResult(); return; }
    showQ();
}

function showResult() {
    document.getElementById('quizArea').classList.add('d-none');
    document.getElementById('resultArea').classList.remove('d-none');
    const total = correct + wrong;
    const pct = total > 0 ? Math.round(correct / total * 100) : 0;
    const c = document.getElementById('scoreCircle');
    c.textContent = pct + '%';
    document.getElementById('progressBar').style.width = '100%';
    if (pct >= 80) {
        c.style.borderColor = '#27ae60'; c.style.color = '#27ae60';
        document.getElementById('resultTitle').textContent = 'Xuất sắc!';
    } else if (pct >= 60) {
        c.style.borderColor = '#f39c12'; c.style.color = '#f39c12';
        document.getElementById('resultTitle').textContent = 'Khá tốt!';
    } else {
        c.style.borderColor = '#e74c3c'; c.style.color = '#e74c3c';
        document.getElementById('resultTitle').textContent = 'Cần cố gắng thêm!';
    }
    document.getElementById('resultDesc').textContent = correct + '/' + total + ' câu đúng.';
}

// Enter to submit / advance
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        if (!answered) { submitAnswer(); }
        else if (!document.getElementById('nextArea').classList.contains('d-none')) { nextQuestion(); }
    }
});

startTest();
</script>
{% endblock %}
