{% extends "base.html" %}
{% block title %}Hồ sơ - RundaWord{% endblock %}
{% block content %}

<div class="rw-card" style="max-width:600px;">
    <div class="row">
        <div class="col-6 mb-3">
            <div
                style="color:var(--muted);font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">
                Name</div>
            <div style="font-weight:700;font-size:1rem;">{{ current_user.name or '—' }}</div>
        </div>
        <div class="col-6 mb-3">
            <div
                style="color:var(--muted);font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">
                Username</div>
            <div style="font-weight:700;font-size:1rem;">{{ current_user.username }}</div>
        </div>
        <div class="col-12 mb-4">
            <div
                style="color:var(--muted);font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">
                Email</div>
            <div style="font-weight:700;font-size:1rem;">{{ current_user.email }}</div>
        </div>
        <div class="col-12" style="border-top:1px solid var(--border);padding-top:20px;">
            <div class="row">
                <div class="col-6">
                    <div style="color:var(--muted);font-size:0.82rem;font-weight:700;margin-bottom:4px;">Packages
                        created:</div>
                    <div style="font-weight:800;font-size:1.4rem;color:var(--navy);">{{ package_count }}</div>
                </div>
            </div>
        </div>
    </div>
    <div class="mt-4">
        <a href="{{ url_for('edit_profile') }}" class="btn btn-navy">Chỉnh sửa hồ sơ</a>
    </div>
</div>

{% endblock %}
