{% extends "base.html" %}
{% block title %}Ghép thẻ - {{ package.package_name }}{% endblock %}

{% block head_extra %}
<style>
.match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 700px;
    margin: 0 auto;
}
.match-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.95rem;
    text-align: center;
    transition: all 0.18s;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: break-word;
    color: var(--navy);
    user-select: none;
}
.match-card:hover { border-color: var(--accent); background: #eef3fb; }
.match-card.selected {
    border-color: var(--navy);
    background: #dde8f8;
    transform: scale(1.02);
}
.match-card.correct {
    border-color: #27ae60;
    background: #eafaf1;
    color: #1e8449;
    cursor: default;
    pointer-events: none;
}
.match-card.wrong {
    border-color: #e74c3c;
    background: #fdf2f2;
    animation: shake 0.35s ease;
}
@keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    60%      { transform: translateX(6px); }
}
.match-header {
    max-width: 700px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.timer-badge {
    background: var(--navy);
    color: white;
    font-weight: 700;
    font-family: 'Poppins', sans-serif;
    font-size: 1.1rem;
    border-radius: 10px;
    padding: 6px 18px;
    min-width: 80px;
    text-align: center;
}
.pairs-left {
    font-size: 0.88rem;
    color: var(--muted);
    font-weight: 600;
}
.match-complete {
    max-width: 500px;
    margin: 40px auto;
    text-align: center;
}
.complete-circle {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 6px solid #27ae60;
    color: #27ae60;
    font-size: 1.6rem;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
}
</style>
{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
    <a href="{{ url_for('package_detail', package_id=package.id) }}"
       style="color:var(--muted);font-size:0.85rem;font-weight:600;text-decoration:none;">
        ← {{ package.package_name }}
    </a>
    <span style="color:var(--muted);">·</span>
    <span style="font-family:'Poppins';font-weight:700;color:var(--navy);">Ghép thẻ</span>
</div>

<div id="gameArea">
    <div class="match-header">
        <div class="pairs-left">Còn lại: <strong id="pairsLeft">-</strong> cặp</div>
        <div class="timer-badge" id="timer">0:00</div>
    </div>
    <div class="match-grid" id="matchGrid"></div>
</div>

<div id="completeArea" class="match-complete d-none">
    <div class="complete-circle" id="completeTime"></div>
    <div style="font-weight:700;font-size:1.3rem;color:var(--navy);margin-bottom:8px;">🎉 Ghép xong!</div>
    <div style="color:var(--muted);margin-bottom:24px;" id="completeMsg"></div>
    <div class="d-flex gap-3 justify-content-center">
        <button class="btn btn-navy px-4" onclick="startGame()">Chơi lại</button>
        <a href="{{ url_for('quiz', package_id=package.id) }}" class="btn btn-cream px-4">Trắc nghiệm</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const allWords    = {{ package.vocabularies | map(attribute='word_en') | list | tojson | safe }};
const allMeanings = {{ package.vocabularies | map(attribute='word_vi') | list | tojson | safe }};

const ROUND_SIZE = Math.min(6, allWords.length); // up to 6 pairs per round
let selected = null, timerInterval = null, seconds = 0;
let totalPairs = 0, matchedPairs = 0;
let pairMap = {}; // card element -> pairId

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startGame() {
    clearInterval(timerInterval);
    seconds = 0;
    matchedPairs = 0;
    selected = null;

    document.getElementById('completeArea').classList.add('d-none');
    document.getElementById('gameArea').classList.remove('d-none');
    document.getElementById('timer').textContent = '0:00';

    // Pick ROUND_SIZE random pairs
    const indices = shuffle([...Array(allWords.length).keys()]).slice(0, ROUND_SIZE);
    totalPairs = indices.length;
    document.getElementById('pairsLeft').textContent = totalPairs;

    // Build card list: EN cards + VI cards interleaved/shuffled
    let cards = [];
    indices.forEach(i => {
        cards.push({ id: i, text: allWords[i],    type: 'en' });
        cards.push({ id: i, text: allMeanings[i], type: 'vi' });
    });
    cards = shuffle(cards);

    const grid = document.getElementById('matchGrid');
    grid.innerHTML = '';
    pairMap = {};

    cards.forEach(card => {
        const el = document.createElement('div');
        el.className = 'match-card';
        el.textContent = card.text;
        el.dataset.id   = card.id;
        el.dataset.type = card.type;
        el.addEventListener('click', () => onCardClick(el));
        grid.appendChild(el);
        pairMap[el] = card.id;
    });

    // Start timer
    timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('timer').textContent = m + ':' + String(s).padStart(2, '0');
    }, 1000);
}

function onCardClick(el) {
    if (el.classList.contains('correct')) return;
    if (el === selected) { el.classList.remove('selected'); selected = null; return; }

    if (!selected) {
        el.classList.add('selected');
        selected = el;
        return;
    }

    const a = selected, b = el;
    a.classList.remove('selected');
    selected = null;

    // Must be same pair id but different type (en vs vi)
    if (a.dataset.id === b.dataset.id && a.dataset.type !== b.dataset.type) {
        // ✓ Match!
        a.classList.add('correct');
        b.classList.add('correct');
        matchedPairs++;
        document.getElementById('pairsLeft').textContent = totalPairs - matchedPairs;

        if (matchedPairs === totalPairs) {
            clearInterval(timerInterval);
            setTimeout(showComplete, 400);
        }
    } else {
        // ✗ Wrong
        a.classList.add('wrong');
        b.classList.add('wrong');
        setTimeout(() => {
            a.classList.remove('wrong');
            b.classList.remove('wrong');
        }, 500);
    }
}

function showComplete() {
    document.getElementById('gameArea').classList.add('d-none');
    document.getElementById('completeArea').classList.remove('d-none');
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    const timeStr = m + ':' + String(s).padStart(2, '0');
    document.getElementById('completeTime').textContent = timeStr;
    document.getElementById('completeMsg').textContent =
        `Bạn ghép xong ${totalPairs} cặp trong ${timeStr}!`;
}

startGame();
</script>
{% endblock %}
