{% extends "base.html" %}
{% block title %}Ghép thẻ - {{ package.package_name }}{% endblock %}

{% block head_extra %}
<style>
/* Mixed, full-width grid (no EN/VI columns) */
.match-container { max-width: 1280px; margin: 0 auto; padding: 18px 28px 70px; }
.match-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    width: 100%;
}
@media (max-width: 1100px) { .match-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 820px)  { .match-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 560px)  { .match-grid { grid-template-columns: repeat(2, 1fr); } }

.match-card {
    background: white;
    border: 2.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
    text-align: center;
    transition: border-color 0.18s, background 0.18s, transform 0.15s, opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: break-word;
    color: var(--navy);
    user-select: none;
    line-height: 1.3;
    height: clamp(102px, 13.5vh, 138px);
}
.match-card:hover:not(.matched) { border-color: var(--accent); background: #eef3fb; transform: translateY(-1px); }

.match-card.selected {
    border-color: var(--navy) !important;
    background: #dde8f8 !important;
    transform: scale(1.02);
}
.match-card.wrong {
    border-color: #e74c3c !important;
    background: #fdf2f2 !important;
    animation: shake 0.35s ease;
}
.match-card.matched {
    opacity: 0;
    transform: scale(0.9);
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
    border-color: #27ae60 !important;
    background: #eafaf1 !important;
}

@keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    60%      { transform: translateX(6px); }
}

/* Header bar */
.match-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}
.timer-badge {
    background: var(--navy); color: white;
    font-weight: 700; font-family: 'Poppins', sans-serif;
    font-size: 1.1rem; border-radius: 10px;
    padding: 6px 20px; min-width: 84px; text-align: center;
}
.pairs-left { font-size: 0.9rem; color: var(--muted); font-weight: 700; }

/* Complete panel */
.match-complete {
    max-width: 500px; margin: 40px auto; text-align: center;
}
.complete-circle {
    width: 110px; height: 110px; border-radius: 50%;
    border: 6px solid #27ae60; color: #27ae60;
    font-size: 1.5rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-family: 'Poppins', sans-serif;
}
</style>
{% endblock %}

{% block content %}
<div class="match-container"> 

<div class="d-flex align-items-center gap-2 mb-4">
    <a href="{{ url_for('package_detail', package_id=package.id) }}"
       style="color:var(--muted);font-size:0.85rem;font-weight:600;text-decoration:none;">
        ← {{ package.package_name }}
    </a>
    <span style="color:var(--muted);">·</span>
    <span style="font-family:'Poppins';font-weight:700;color:var(--navy);">Ghép thẻ</span>
</div>

<div id="gameArea">
    <div class="match-header">
        <div class="pairs-left">Còn lại: <strong id="pairsLeft">–</strong> cặp</div>
        <div class="timer-badge" id="timer">0:00</div>
    </div>

    <div class="match-grid" id="matchGrid"></div>

    <div class="text-center mt-4">
        <button class="btn btn-cream btn-sm" onclick="startGame()">
            <i class="fas fa-redo me-1"></i>Chơi lại
        </button>
    </div>
</div>

<div id="completeArea" class="match-complete d-none">
    <div class="complete-circle" id="completeTime"></div>
    <div style="font-weight:700;font-size:1.3rem;color:var(--navy);margin-bottom:8px;">🎉 Ghép xong tất cả!</div>
    <div style="color:var(--muted);margin-bottom:24px;" id="completeMsg"></div>
    <div class="d-flex gap-3 justify-content-center">
        <button class="btn btn-navy px-4" onclick="startGame()">Chơi lại</button>
        <a href="{{ url_for('quiz', package_id=package.id) }}" class="btn btn-cream px-4">Trắc nghiệm</a>
    </div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const allWords    = {{ package.vocabularies | map(attribute='word_en') | list | tojson | safe }};
const allMeanings = {{ package.vocabularies | map(attribute='word_vi') | list | tojson | safe }};

// Prefer a 5x4 layout (20 cards = 10 pairs) when possible
const MAX_PAIRS = Math.min(10, allWords.length);

let selected = null, timerInterval = null, seconds = 0;
let totalPairs = 0, matchedPairs = 0;

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startGame() {
    clearInterval(timerInterval);
    seconds = 0; matchedPairs = 0; selected = null;
    document.getElementById('completeArea').classList.add('d-none');
    document.getElementById('gameArea').classList.remove('d-none');
    document.getElementById('timer').textContent = '0:00';

    // Pick MAX_PAIRS random pairs
    const indices = shuffle([...Array(allWords.length).keys()]).slice(0, MAX_PAIRS);
    totalPairs = indices.length;
    document.getElementById('pairsLeft').textContent = totalPairs;

    // Build a mixed deck (EN + VI) then shuffle for a messy grid
    const deck = shuffle([
        ...indices.map(i => ({ id: i, text: allWords[i],    type: 'en' })),
        ...indices.map(i => ({ id: i, text: allMeanings[i], type: 'vi' })),
    ]);

    const grid = document.getElementById('matchGrid');
    grid.innerHTML = '';

    deck.forEach(card => {
        const el = document.createElement('div');
        el.className = 'match-card';
        el.textContent = card.text;
        el.dataset.id   = card.id;
        el.dataset.type = card.type;
        el.addEventListener('click', () => onCardClick(el));
        grid.appendChild(el);
    });

    timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('timer').textContent = m + ':' + String(s).padStart(2, '0');
    }, 1000);
}

function onCardClick(el) {
    if (el.classList.contains('matched') || el.classList.contains('selected')) {
        el.classList.remove('selected');
        selected = null;
        return;
    }

    if (!selected) {
        el.classList.add('selected');
        selected = el;
        return;
    }

    const a = selected, b = el;
    a.classList.remove('selected');
    selected = null;

    if (a.dataset.id === b.dataset.id && a.dataset.type !== b.dataset.type) {
        // ✓ Correct match — fade out
        a.classList.add('matched');
        b.classList.add('matched');
        matchedPairs++;
        document.getElementById('pairsLeft').textContent = totalPairs - matchedPairs;

        // Remove from DOM after transition
        setTimeout(() => {
            a.style.visibility = 'hidden';
            b.style.visibility = 'hidden';
        }, 380);

        if (matchedPairs === totalPairs) {
            clearInterval(timerInterval);
            setTimeout(showComplete, 500);
        }
    } else {
        // ✗ Wrong
        a.classList.add('wrong');
        b.classList.add('wrong');
        setTimeout(() => {
            a.classList.remove('wrong');
            b.classList.remove('wrong');
        }, 500);
    }
}

function showComplete() {
    document.getElementById('gameArea').classList.add('d-none');
    document.getElementById('completeArea').classList.remove('d-none');
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    const timeStr = m + ':' + String(s).padStart(2, '0');
    document.getElementById('completeTime').textContent = timeStr;
    document.getElementById('completeMsg').textContent =
        'Bạn ghép xong ' + totalPairs + ' cặp trong ' + timeStr + '!';
}

startGame();
</script>
{% endblock %}
