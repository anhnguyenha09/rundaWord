{% extends "base.html" %}
{% block title %}Đăng ký - RundaWord{% endblock %}
{% block content %}

<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(13,33,55,0.12);">
        <h2 style="font-family:'Poppins',sans-serif;font-weight:700;color:var(--navy);text-align:center;margin-bottom:28px;">Đăng ký</h2>

        <form method="POST">
            <div class="mb-3">
                <label class="rw-label">Tên</label>
                <input type="text" class="rw-input" name="name" placeholder="Nhập tên của bạn" required>
            </div>
            <div class="mb-3">
                <label class="rw-label">Email</label>
                <input type="email" class="rw-input" name="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="mb-3">
                <label class="rw-label">Tên người dùng</label>
                <input type="text" class="rw-input" name="username" placeholder="Nhập tên người dùng" required>
            </div>
            <div class="mb-3">
                <label class="rw-label">Mật khẩu</label>
                <input type="password" class="rw-input" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <div class="mb-4">
                <label class="rw-label">Xác nhận mật khẩu</label>
                <input type="password" class="rw-input" name="confirm_password" placeholder="Nhập lại mật khẩu" required>
            </div>
            <button type="submit" class="btn btn-navy w-100 py-3" style="font-size:1rem;">Đăng ký</button>
        </form>

        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" style="color:var(--accent);font-weight:700;text-decoration:none;font-size:0.95rem;">Đăng nhập</a>
        </div>
    </div>
</div>

{% endblock %}
